name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/.github/CLA.md"
          branch: "main"
          allowlist: dependabot[bot],renovate[bot]
          custom-notsigned-prcomment: |
            Merci pour votre contribution ! Avant de pouvoir merger cette PR, vous devez signer notre [Contributor License Agreement (CLA)](${{ github.repository }}/blob/main/.github/CLA.md).

            Pour signer, commentez cette PR avec :
            ```
            I have read the CLA Document and I hereby sign the CLA
            ```
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
